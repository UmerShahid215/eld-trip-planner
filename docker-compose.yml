# Local full-stack backend: Postgres + Django API.
# Run the frontend separately with `cd frontend && npm run dev`.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eld
      POSTGRES_PASSWORD: eld
      POSTGRES_DB: eld
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eld"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: dev-insecure
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://eld:eld@db:5432/eld
      CORS_ALLOW_ALL_ORIGINS: "True"
      NOMINATIM_USER_AGENT: "eld-trip-planner/1.0 (contact: you@example.com)"
      ORS_API_KEY: "${ORS_API_KEY:-}"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
