# Render Blueprint — one-click deploy of the Django backend + Postgres.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: eld-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false          # set to your onrender.com host after first deploy
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # set to your Vercel frontend URL
      - key: ORS_API_KEY
        sync: false          # paste your OpenRouteService key
      - key: NOMINATIM_USER_AGENT
        value: "eld-trip-planner/1.0 (contact: you@example.com)"
      - key: DATABASE_URL
        fromDatabase:
          name: eld-db
          property: connectionString

databases:
  - name: eld-db
    plan: free
